name: lexaway
description: A language learning adventure game.
publish_to: "none"
version: 1.5.0+6

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_audio: ^2.11.14
  flutter_riverpod: ^2.6.1
  hive_ce: ^2.10.0
  sqlite_async: ^0.11.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  http: ^1.3.0
  go_router: ^17.2.0
  sherpa_onnx: ^1.12.0
  audioplayers: ^6.1.0
  archive: ^4.0.2
  url_launcher: ^6.3.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  flutter_timezone: ^4.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  integration_test:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  flutter_launcher_icons: ^0.14.3

flutter:
  generate: true
  uses-material-design: true

  fonts:
    - family: Pixelify Sans
      fonts:
        - asset: assets/fonts/PixelifySans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PixelifySans-Bold.ttf
          weight: 700
    - family: Atkinson Hyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegible-Regular.ttf
          weight: 400
        - asset: assets/fonts/AtkinsonHyperlegible-Bold.ttf
          weight: 700
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
          weight: 400
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700

  assets:
    - assets/fonts/licenses/
    - assets/images/textures/
    - assets/images/parallax/
    - assets/images/terrain/
    - assets/images/entities/
    - assets/images/creatures/
    - assets/images/coins/
    - assets/images/ui/
    - assets/audio/
    - assets/bgm/
    - assets/dino/
    # Female characters (all 12 complete)
    - assets/images/characters/female/cole/base/
    - assets/images/characters/female/cole/egg/
    - assets/images/characters/female/doux/base/
    - assets/images/characters/female/doux/egg/
    - assets/images/characters/female/kira/base/
    - assets/images/characters/female/kira/egg/
    - assets/images/characters/female/kuro/base/
    - assets/images/characters/female/kuro/egg/
    - assets/images/characters/female/loki/base/
    - assets/images/characters/female/loki/egg/
    - assets/images/characters/female/mono/base/
    - assets/images/characters/female/mono/egg/
    - assets/images/characters/female/mort/base/
    - assets/images/characters/female/mort/egg/
    - assets/images/characters/female/nico/base/
    - assets/images/characters/female/nico/egg/
    - assets/images/characters/female/olaf/base/
    - assets/images/characters/female/olaf/egg/
    - assets/images/characters/female/sena/base/
    - assets/images/characters/female/sena/egg/
    - assets/images/characters/female/tard/base/
    - assets/images/characters/female/tard/egg/
    - assets/images/characters/female/vita/base/
    - assets/images/characters/female/vita/egg/
    # Male characters (8 complete — doux, mort, tard, vita missing base sprites)
    - assets/images/characters/male/cole/base/
    - assets/images/characters/male/cole/egg/
    - assets/images/characters/male/kira/base/
    - assets/images/characters/male/kira/egg/
    - assets/images/characters/male/kuro/base/
    - assets/images/characters/male/kuro/egg/
    - assets/images/characters/male/loki/base/
    - assets/images/characters/male/loki/egg/
    - assets/images/characters/male/mono/base/
    - assets/images/characters/male/mono/egg/
    - assets/images/characters/male/nico/base/
    - assets/images/characters/male/nico/egg/
    - assets/images/characters/male/olaf/base/
    - assets/images/characters/male/olaf/egg/
    - assets/images/characters/male/sena/base/
    - assets/images/characters/male/sena/egg/

flutter_native_splash:
  color: "#3E2723"
  ios: true
  android: true

flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  ios: true
  android: true
  adaptive_icon_background: "#3E2723"
  adaptive_icon_foreground: "assets/app_icon.png"
