name: lexaway
description: A language learning adventure game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_audio: ^2.11.14
  google_fonts: ^8.0.2
  flutter_riverpod: ^2.6.1
  hive_ce: ^2.10.0
  sqlite_async: ^0.11.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  http: ^1.3.0
  go_router: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/parallax/
    - assets/images/terrain/
    - assets/images/dino/
    - assets/images/coins/
    - assets/audio/
