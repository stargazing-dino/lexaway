name: lexaway
description: A language learning adventure game.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  cupertino_icons: ^1.0.8
  flame: ^1.35.1
  flame_audio: ^2.11.14
  google_fonts: ^8.0.2
  flutter_riverpod: ^2.6.1
  hive_ce: ^2.10.0
  sqlite_async: ^0.11.0
  sqlite3_flutter_libs: ^0.5.32
  path_provider: ^2.1.5
  http: ^1.3.0
  go_router: ^17.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/parallax/
    - assets/images/terrain/
    - assets/images/coins/
    - assets/images/ui/
    - assets/audio/
    - assets/dino/
    # Female characters (all 12 complete)
    - assets/images/download/female/cole/base/
    - assets/images/download/female/cole/egg/
    - assets/images/download/female/doux/base/
    - assets/images/download/female/doux/egg/
    - assets/images/download/female/kira/base/
    - assets/images/download/female/kira/egg/
    - assets/images/download/female/kuro/base/
    - assets/images/download/female/kuro/egg/
    - assets/images/download/female/loki/base/
    - assets/images/download/female/loki/egg/
    - assets/images/download/female/mono/base/
    - assets/images/download/female/mono/egg/
    - assets/images/download/female/mort/base/
    - assets/images/download/female/mort/egg/
    - assets/images/download/female/nico/base/
    - assets/images/download/female/nico/egg/
    - assets/images/download/female/olaf/base/
    - assets/images/download/female/olaf/egg/
    - assets/images/download/female/sena/base/
    - assets/images/download/female/sena/egg/
    - assets/images/download/female/tard/base/
    - assets/images/download/female/tard/egg/
    - assets/images/download/female/vita/base/
    - assets/images/download/female/vita/egg/
    # Male characters (8 complete — doux, mort, tard, vita missing base sprites)
    - assets/images/download/male/cole/base/
    - assets/images/download/male/cole/egg/
    - assets/images/download/male/kira/base/
    - assets/images/download/male/kira/egg/
    - assets/images/download/male/kuro/base/
    - assets/images/download/male/kuro/egg/
    - assets/images/download/male/loki/base/
    - assets/images/download/male/loki/egg/
    - assets/images/download/male/mono/base/
    - assets/images/download/male/mono/egg/
    - assets/images/download/male/nico/base/
    - assets/images/download/male/nico/egg/
    - assets/images/download/male/olaf/base/
    - assets/images/download/male/olaf/egg/
    - assets/images/download/male/sena/base/
    - assets/images/download/male/sena/egg/
