# App Store Connect Metadata
# Localize each field per language. Apple limits noted in comments.

# Same for all languages
support_url: "https://lexaway.github.io/lexaway"
marketing_url: "https://lexaway.github.io/lexaway"

en:
  # Max 170 chars. Shown above description, can be updated without a new build.
  promotional_text: "A pixel-art language game. Pick a language, hatch a dino, and learn vocabulary as you walk through a world that grows with every correct answer."
  # Max 4000 chars.
  description: |
    Lexaway is a language learning game with a simple loop: answer vocabulary questions correctly and your pixel-art dino walks forward. Keep going and see what the world has in store.

    Pick a language, download the pack, and start playing — no account needed.

    FEATURES
    • French, Spanish, German, Italian, and Portuguese from English
    • Fully offline — download a language pack and learn anywhere
    • Text-to-speech pronunciation for every word
    • Pixel-art world that grows as you progress
    • No ads, no accounts, no tracking

    Lexaway is open source. Feedback and contributions welcome at github.com/lexaway.
  # Max 100 chars total, comma-separated.
  keywords: "language learning,vocabulary,french,spanish,german,italian,portuguese,pixel art,game,offline"

de:
  promotional_text: "Ein Pixel-Art-Sprachspiel. Wähle eine Sprache, schlüpfe einen Dino und lerne Vokabeln auf dem Weg durch eine Welt, die mit jeder richtigen Antwort wächst."
  description: |
    Lexaway ist ein Sprachlernspiel mit einem einfachen Prinzip: Beantworte Vokabelfragen richtig und dein Pixel-Art-Dino läuft weiter. Mach weiter und entdecke, was die Welt zu bieten hat.

    Wähle eine Sprache, lade das Paket herunter und leg los — kein Konto nötig.

    FEATURES
    • Französisch, Spanisch, Deutsch, Italienisch und Portugiesisch ab Englisch
    • Komplett offline — lade ein Sprachpaket herunter und lerne überall
    • Text-to-Speech-Aussprache für jedes Wort
    • Pixel-Art-Welt, die mit deinem Fortschritt wächst
    • Keine Werbung, keine Konten, kein Tracking

    Lexaway ist Open Source. Feedback und Beiträge willkommen auf github.com/lexaway.
  keywords: "Sprachen lernen,Vokabeln,Französisch,Spanisch,Deutsch,Italienisch,Portugiesisch,Pixel Art,Spiel,offline"

es:
  promotional_text: "Un juego de idiomas en pixel art. Elige un idioma, eclosiona un dino y aprende vocabulario mientras recorres un mundo que crece con cada respuesta correcta."
  description: |
    Lexaway es un juego para aprender idiomas con una mecánica sencilla: responde bien las preguntas de vocabulario y tu dino en pixel art avanza. Sigue adelante y descubre lo que el mundo tiene preparado.

    Elige un idioma, descarga el paquete y empieza a jugar — no necesitas cuenta.

    CARACTERÍSTICAS
    • Francés, español, alemán, italiano y portugués desde inglés
    • Totalmente offline — descarga un paquete de idioma y aprende donde quieras
    • Pronunciación con texto a voz para cada palabra
    • Mundo en pixel art que crece a medida que avanzas
    • Sin anuncios, sin cuentas, sin rastreo

    Lexaway es código abierto. Comentarios y contribuciones bienvenidos en github.com/lexaway.
  keywords: "aprender idiomas,vocabulario,francés,español,alemán,italiano,portugués,pixel art,juego,offline"

