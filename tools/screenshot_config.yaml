ios_devices:
  - name: iPhone_16_Plus
    simulator_type: com.apple.CoreSimulator.SimDeviceType.iPhone-16-Plus
    runtime: com.apple.CoreSimulator.SimRuntime.iOS-18-2
  - name: iPhone_11_Pro_Max
    simulator_type: com.apple.CoreSimulator.SimDeviceType.iPhone-11-Pro-Max
    runtime: com.apple.CoreSimulator.SimRuntime.iOS-18-2

android_devices:
  - name: Pixel_7a_API_36
    system_image: "system-images;android-36;google_apis;arm64-v8a"

languages: [en, de, es, fr, it, pt, nl]

screens:
  - filename: 01_packs
    caption:
      en: "Choose your language"
      de: "Wähle deine Sprache"
      es: "Elige tu idioma"
      fr: "Choisis ta langue"
      it: "Scegli la tua lingua"
      pt: "Escolha seu idioma"
      nl: "Kies je taal"
    style:
      scrim_height: 0.18
  - filename: 02_settings
    caption:
      en: "Learn your way"
      de: "Lerne auf deine Art"
      es: "Aprende a tu manera"
      fr: "Apprends à ta façon"
      it: "Impara a modo tuo"
      pt: "Aprenda do seu jeito"
      nl: "Leer op jouw manier"
  - filename: 03_egg_selection
    caption:
      en: "Hatch your companion"
      de: "Schlüpfe deinen Begleiter"
      es: "Eclosiona tu compañero"
      fr: "Fais éclore ton compagnon"
      it: "Schiudi il tuo compagno"
      pt: "Choque seu companheiro"
      nl: "Broed je metgezel uit"
  - filename: 04_game
    caption:
      en: "Learn by playing"
      de: "Lerne beim Spielen"
      es: "Aprende jugando"
      fr: "Apprends en jouant"
      it: "Impara giocando"
      pt: "Aprenda jogando"
      nl: "Leer al spelend"
    style:
      scrim_height: 0.15
  - filename: 05_loading
    caption: null

style:
  scrim_color: "#000000"
  scrim_opacity: 0.85
  scrim_height: 0.25
  caption_color: "#ffffff"
  caption_size: 56
  font: PressStart2P-Regular.ttf
  dither_pixel_size: 12
  solid_ratio: 0.65
